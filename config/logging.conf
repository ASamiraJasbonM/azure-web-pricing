[loggers]
keys=root,azure_pricing,agent,mcp

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=defaultFormatter,detailedFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_azure_pricing]
level=INFO
handlers=consoleHandler,fileHandler
qualname=azure_pricing
propagate=0

[logger_agent]
level=INFO
handlers=consoleHandler,fileHandler
qualname=agent
propagate=0

[logger_mcp]
level=INFO
handlers=consoleHandler,fileHandler
qualname=mcp
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=defaultFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
args=('logs/azure_cost_agent.log', 'a', 10485760, 5)

[formatter_defaultFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(funcName)s:%(lineno)d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S